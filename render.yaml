services:
  - type: web
    name: neonwatch
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn monitoring:app -c gunicorn.conf.py
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: "sqlite:///./neonwatch.db"
